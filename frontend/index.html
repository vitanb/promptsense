<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptSense — Enterprise LLM Guardrails</title>
    <meta name="description" content="Universal LLM guardrail and compliance platform for enterprise teams." />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --c-purple: #7F77DD; --c-purple-light: #EEEDFE; --c-purple-dark: #3C3489;
        --c-green: #1D9E75; --c-red: #E24B4A; --c-amber: #BA7517;
        --c-blue: #378ADD; --c-coral: #D85A30;
        --c-bg: #ffffff; --c-bg2: #F8F8F7; --c-bg3: #F1EFE8;
        --c-text: #1a1a1a; --c-text2: #555; --c-text3: #999;
        --c-border: rgba(0,0,0,0.10); --c-border2: rgba(0,0,0,0.18);
        --radius: 8px; --radius-lg: 12px;
        --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 2px 8px rgba(0,0,0,0.05);
        --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
        --shadow-lg: 0 8px 32px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.06);
        --transition: 0.15s ease;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        font-size: 14px; line-height: 1.6; color: var(--c-text); background: var(--c-bg);
        -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --c-bg: #111; --c-bg2: #1a1a1a; --c-bg3: #222;
          --c-text: #f0f0f0; --c-text2: #aaa; --c-text3: #666;
          --c-border: rgba(255,255,255,0.10); --c-border2: rgba(255,255,255,0.18);
          --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
          --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
          --shadow-lg: 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
        }
      }
      html { scroll-behavior: smooth; }
      a { color: inherit; text-decoration: none; }
      button { font-family: inherit; cursor: pointer; }
      input, select, textarea { font-family: inherit; font-size: 13px; }
      #root { min-height: 100vh; }

      /* Selection */
      ::selection { background: #7F77DD33; color: var(--c-text); }

      /* Focus-visible — accessible keyboard outlines */
      :focus-visible { outline: 2px solid var(--c-purple); outline-offset: 2px; border-radius: 4px; }
      button:focus-visible, a:focus-visible { outline: 2px solid var(--c-purple); outline-offset: 2px; }

      /* Thin custom scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--c-border2); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--c-text3); }

      /* Global animations */
      @keyframes spin     { to { transform: rotate(360deg); } }
      @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp  { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes scaleIn  { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
      @keyframes pulse    { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

      /* Page-level fade-in */
      .page-enter { animation: slideUp 0.2s ease both; }

      /* Skeleton pulse */
      .skeleton { background: linear-gradient(90deg, var(--c-bg2) 25%, var(--c-bg3) 50%, var(--c-bg2) 75%);
                  background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--radius); }
      @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
