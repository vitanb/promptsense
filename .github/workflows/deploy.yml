name: Deploy

on:
  push:
    branches:
      - main      # → production
      - staging   # → staging
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false  # Never cancel in-flight deploys

permissions:
  id-token: write   # Needed for OIDC → AWS
  contents: read

env:
  NODE_VERSION: '20'

jobs:

  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
        run: node src/db/migrate.js
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          JWT_SECRET: test-secret-at-least-32-characters-long
          ENCRYPTION_KEY: test-key-32-characters-exactly!!
          NODE_ENV: test
        run: npm test --if-present

  # ── 2. Build & Push Images to ECR ─────────────────────────────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag:      ${{ steps.meta.outputs.version }}
      backend_image:  ${{ steps.backend_out.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}
          role-session-name: GitHubDeploy-${{ github.run_id }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: echo "version=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.ECR_BACKEND }}:${{ steps.meta.outputs.version }}
            ${{ secrets.ECR_BACKEND }}:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - id: backend_out
        run: echo "image=${{ secrets.ECR_BACKEND }}:${{ steps.meta.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Build frontend (static export)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/Dockerfile.frontend
          build-args: |
            VITE_API_URL=https://${{ secrets.API_SUBDOMAIN }}.${{ secrets.DOMAIN_NAME }}/api
          push: false
          load: true
          tags: frontend:build
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Extract frontend static files
        run: |
          docker create --name tmp_fe frontend:build
          docker cp tmp_fe:/usr/share/nginx/html ./frontend-dist
          docker rm tmp_fe

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ steps.meta.outputs.version }}
          path: frontend-dist/
          retention-days: 3

  # ── 3. Deploy Backend to ECS ───────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend → ECS Fargate
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: https://${{ secrets.API_SUBDOMAIN }}.${{ secrets.DOMAIN_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Download current ECS task definition
        run: |
          FAMILY=ps-${{ github.ref_name == 'main' && 'production' || 'staging' }}-backend
          aws ecs describe-task-definition --task-definition $FAMILY \
            --query taskDefinition > task-definition.json

      - name: Inject new image into task definition
        id: task_def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  task-definition.json
          container-name:   backend
          image:            ${{ needs.build.outputs.backend_image }}

      - name: Run DB migrations (one-off ECS task)
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --task-definition ${{ steps.task_def.outputs.task-definition }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNET_IDS }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"backend","command":["node","src/db/migrate.js"]}]}' \
            --query 'tasks[0].taskArn' --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster ${{ secrets.ECS_CLUSTER }} --tasks "$TASK_ARN"

          EXIT=$(aws ecs describe-tasks --cluster ${{ secrets.ECS_CLUSTER }} --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Exit code: $EXIT"
          [ "$EXIT" = "0" ] || (echo "Migrations failed" && exit 1)

      - name: Rolling deploy → ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:           ${{ steps.task_def.outputs.task-definition }}
          service:                   ${{ secrets.ECS_SERVICE }}
          cluster:                   ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes:          10
          force-new-deployment:      true

  # ── 4. Deploy Frontend to S3 + CloudFront ─────────────────────────────────
  deploy-frontend:
    name: Deploy frontend → S3 + CloudFront
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: https://${{ secrets.APP_SUBDOMAIN }}.${{ secrets.DOMAIN_NAME }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ needs.build.outputs.image_tag }}
          path: frontend-dist/

      # Long cache for hashed JS/CSS bundles, no-cache for entry points
      - name: Sync hashed assets (1-year cache)
        run: |
          aws s3 sync frontend-dist/ s3://${{ secrets.FRONTEND_BUCKET }} \
            --delete \
            --exclude "index.html" --exclude "*.txt" --exclude "*.json" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html + manifests (no-cache)
        run: |
          aws s3 cp frontend-dist/index.html \
            s3://${{ secrets.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_ID }} \
            --paths "/*"

  # ── 5. Smoke Test ──────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Wait for propagation
        run: sleep 20

      - name: API health check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            https://${{ secrets.API_SUBDOMAIN }}.${{ secrets.DOMAIN_NAME }}/health)
          echo "API: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Frontend check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            https://${{ secrets.APP_SUBDOMAIN }}.${{ secrets.DOMAIN_NAME }})
          echo "Frontend: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
